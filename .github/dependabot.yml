version: 2
updates:
  # npm — application dependencies
  - package-ecosystem: npm
    directory: /communitypool
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps"
      prefix-development: "dev-deps"
      include: scope
    groups:
      # Group dev-only updates so they land as a single PR per ecosystem.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group safe (patch) production updates.
      production-patch:
        dependency-type: production
        update-types:
          - patch
    # Production minor/major updates ship as individual PRs so a human can
    # review impact + lockfile diff for each one.
    ignore: []

  # GitHub Actions — keep workflow actions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 4
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
