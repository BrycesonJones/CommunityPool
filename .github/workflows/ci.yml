name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: communitypool

jobs:
  node:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ['20']
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version-file: communitypool/.nvmrc
          cache: npm
          cache-dependency-path: communitypool/package-lock.json

      - name: Pin npm to engines.npm major
        run: npm install -g npm@10

      - name: Print toolchain
        run: |
          node --version
          npm --version

      - name: Install (deterministic, no install scripts)
        run: npm ci --ignore-scripts

      - name: Production-only audit (high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Full audit (informational)
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Supply-chain guard checks
        run: npm run supply-chain:check

      - name: Generate CycloneDX SBOM (production-only)
        run: npm run sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: communitypool/sbom.json
          if-no-files-found: error
          retention-days: 90

  contracts:
    name: foundry
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Print Foundry version
        run: forge --version

      - name: Forge build
        run: forge build --sizes

      - name: Forge tests
        run: forge test -vvv

      - name: Sync contract artifact (Next.js runtime ABI/bytecode)
        run: |
          # Project script regenerates lib/onchain/community-pool-artifact.json
          # from forge-out/. The check mode below verifies it matches what's
          # committed (or what was just generated, in this CI run).
          node scripts/sync-contract-artifact.mjs

      - name: Verify committed contract artifact matches forge-out
        run: node scripts/sync-contract-artifact.mjs --check

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [node, contracts]
    if: always()
    steps:
      - name: Fail if any required job failed
        if: needs.node.result != 'success' || needs.contracts.result != 'success'
        run: |
          echo "node: ${{ needs.node.result }}"
          echo "contracts: ${{ needs.contracts.result }}"
          exit 1
